name: Security Scanning

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 1'  # Weekly scan on Monday at 1:30 AM UTC

jobs:
  # ─── Job 1: CodeQL Static Analysis (SAST) ──────────────────────────
  codeql-analysis:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript, python'
        queries: security-extended  # Extended ruleset catches more issues

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # ─── Job 2: Python Dependency Vulnerability Scan ───────────────────
  python-deps-scan:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pip-audit safety

    - name: Run pip-audit (CVE database check)
      run: pip-audit --desc
      continue-on-error: true

    - name: Run safety check (alternative vuln DB)
      run: safety check --full-report
      continue-on-error: true  # Advisory — don't block on false positives

  # ─── Job 3: Node.js / Frontend Dependency Scan ────────────────────
  frontend-deps-scan:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Run npm audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Run ESLint security checks
      run: npx eslint . --max-warnings 0
      continue-on-error: true

  # ─── Job 4: Secret Scanning ────────────────────────────────────────
  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for thorough scanning

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 5: Docker Image Security Scan ─────────────────────────────
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: [python-deps-scan]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t hrbot-api:scan ./backend

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        image-ref: 'hrbot-api:scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
