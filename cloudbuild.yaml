steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/hrbot-api', './backend']

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hrbot-api']

  # Step 3: Deploy to Cloud Run with security-hardened config
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hrbot-api
      - --image=gcr.io/$PROJECT_ID/hrbot-api
      - --region=asia-south1
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --max-instances=3
      - --concurrency=80
      - --set-env-vars
      - >-
        AUTH_REQUIRED=true,
        ALLOWED_ORIGINS=https://your-frontend.vercel.app,
        ALLOWED_HOSTS=hrbot-api-xxxxx-uc.a.run.app,
        ENABLE_DOCS=false
      - --set-secrets
      - ANTHROPIC_API_KEY=ANTHROPIC_KEY:latest,GOOGLE_APPLICATION_CREDENTIALS=/secrets/firebase/firebase-sa.json
    secretEnv: ['ANTHROPIC_KEY']

# Secret Manager references (Strategy #4)
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/ANTHROPIC_KEY/versions/latest
      env: 'ANTHROPIC_KEY'
